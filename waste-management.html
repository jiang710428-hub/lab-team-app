<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>危废管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f1f4fa; color: #1f2329; }
  .phone { position: relative; width: 375px; height: 812px; margin: 20px auto; background: #f1f4fa; border-radius: 30px; box-shadow: 0 6px 24px rgba(0,0,0,.12); overflow: hidden; }
  .statusbar { height: 44px; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #1f2329; background: #f1f4fa; }
  .statusbar .right { display: flex; align-items: center; gap: 6px; }
  .navbar { height: 44px; display: flex; align-items: center; position: relative; background: #f1f4fa; padding: 0 12px; }
  .navbar .back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .navbar .title { flex: 1; font-size: 17px; font-weight: 600; color: #ff8a00; text-align: center; margin-right: 32px; }
  .search-wrap { padding: 8px 14px 6px; background: #f1f4fa; }
  .search { display: flex; align-items: center; gap: 6px; height: 36px; background: #fff; border: 1.5px solid #ff8a00; border-radius: 10px; padding: 0 10px; }
  .search input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 13px; color: #1f2329; }
  .search input::placeholder { color: #aab0bb; }
  .search svg { color: #ff8a00; }
  .stat-row { display: flex; gap: 8px; padding: 6px 14px 4px; }
  .stat { flex: 1; background: #fff; border-radius: 10px; padding: 8px 10px; }
  .stat .lbl { font-size: 11px; color: #8a8f99; margin-bottom: 2px; }
  .stat .num { font-size: 18px; font-weight: 700; }
  .stat.blue .lbl { color: #2f7bff; }
  .stat.blue .num { color: #2f7bff; }
  .stat.green .lbl { color: #5cb85c; }
  .stat.green .num { color: #5cb85c; }
  .stat.purple .lbl { color: #9b8cff; }
  .stat.purple .num { color: #9b8cff; }
  .list { padding: 8px 14px 110px; overflow-y: auto; height: calc(100% - 44px - 44px - 70px - 22px); }
  .card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; transition: transform .1s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .card:active { background: #f8f9fb; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .card-title { display: flex; align-items: center; gap: 8px; }
  .card-title .name { font-size: 15px; font-weight: 600; color: #1f2329; }
  .status-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; }
  .status-tag.liquid { background: #e8f0ff; color: #2f7bff; }
  .status-tag.solid { background: #fff3e0; color: #ff8a00; }
  .card-actions { display: flex; gap: 12px; }
  .icon-btn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8a8f99; -webkit-tap-highlight-color: transparent; }
  .icon-btn:active { color: #ff8a00; }
  .info-row { display: flex; align-items: flex-start; gap: 4px; font-size: 13px; color: #4a4f57; margin-bottom: 5px; }
  .info-row .lbl { color: #8a8f99; flex-shrink: 0; }
  .info-row .lbl2 { color: #8a8f99; flex-shrink: 0; margin-left: 14px; }
  .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; padding-top: 8px; border-top: 1px dashed #eef0f4; }
  .remark { font-size: 12px; color: #8a8f99; flex: 1; padding-right: 10px; }
  .dept-pill { font-size: 12px; color: #ff8a00; background: #fff3e0; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
  .fab { position: absolute; left: 50%; transform: translateX(-50%); bottom: 22px; background: #ff8a00; color: #fff; height: 46px; width: 220px; border-radius: 23px; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 15px; font-weight: 600; box-shadow: 0 8px 16px rgba(255,138,0,.35); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .15s; }
  .fab:active { transform: translateX(-50%) scale(.96); }
  .home-indicator { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #1f2329; }
  .toast { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,.78); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 99; opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 260px; text-align: center; }
  .toast.show { opacity: 1; }
  .mask { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
  .mask.show { display: flex; }
  .modal { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 18px 16px 28px; animation: slideUp .25s ease; max-height: 90%; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-bar { width: 36px; height: 4px; border-radius: 2px; background: #e1e5ec; margin: -6px auto 14px; }
  .modal h4 { font-size: 16px; text-align: center; margin-bottom: 14px; color: #1f2329; }
  .form-item { margin-bottom: 12px; }
  .form-item .lbl { font-size: 13px; color: #4a4f57; margin-bottom: 6px; }
  .form-item .lbl .req { color: #ff3b30; }
  .form-item .ipt { width: 100%; height: 38px; background: #f6f7f9; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0 10px; font-size: 14px; color: #1f2329; outline: 0; }
  .form-item .ipt:focus { border-color: #ff8a00; background: #fff; }
  .form-item textarea.ipt { height: 76px; padding: 8px 10px; resize: none; }
  .switch-row { display: flex; gap: 8px; }
  .switch-opt { flex: 1; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; color: #4a4f57; background: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .switch-opt.active { border-color: #ff8a00; background: #fff3e0; color: #ff8a00; }
  .ipt-sel { width: 100%; height: 38px; background: #f6f7f9; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0 10px; font-size: 14px; color: #1f2329; display: flex; align-items: center; justify-content: space-between; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .ipt-sel:active { background: #eee; }
  .ipt-sel .placeholder { color: #aab0bb; }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn { flex: 1; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn.cancel { background: #f3f4f6; color: #4a4f57; }
  .btn.confirm { background: #ff8a00; color: #fff; }
  .btn:active { transform: scale(.97); }
  .dept-list { max-height: 300px; overflow-y: auto; }
  .dept-item { height: 44px; display: flex; align-items: center; padding: 0 16px; font-size: 14px; color: #1f2329; cursor: pointer; -webkit-tap-highlight-color: transparent; border-bottom: 1px solid #f0f2f5; }
  .dept-item:active { background: #f6f7f9; }
  .dept-item.selected { color: #ff8a00; font-weight: 600; }
  .dept-item.selected::after { content: '✓'; margin-left: auto; color: #ff8a00; font-weight: 700; }
  .confirm-mask { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 60; display: none; align-items: center; justify-content: center; padding: 0 40px; }
  .confirm-mask.show { display: flex; }
  .confirm-box { width: 100%; max-width: 280px; background: #fff; border-radius: 14px; overflow: hidden; animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .confirm-title { font-size: 16px; font-weight: 600; text-align: center; padding: 22px 20px 8px; color: #1f2329; }
  .confirm-msg { font-size: 14px; text-align: center; padding: 0 20px 20px; color: #8a8f99; line-height: 1.5; }
  .confirm-btns { display: flex; border-top: 1px solid #eef0f4; }
  .confirm-btns .cb { flex: 1; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .confirm-btns .cb.cancel { color: #4a4f57; border-right: 1px solid #eef0f4; }
  .confirm-btns .cb.ok { color: #ff3b30; }
  .confirm-btns .cb:active { background: #f3f5f9; }
  .empty-state { text-align: center; color: #8a8f99; padding: 60px 0; font-size: 14px; }
</style>
</head>
<body>
<div class="phone">

  <!-- 状态栏 -->
  <div class="statusbar">
    <span>12:00</span>
    <span class="right">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 22l4-12 4 12H2zm10 0V8l8 14h-8z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7.5 3 3.7 5.7 2 9.5L12 22l10-12.5C20.3 5.7 16.5 3 12 3z"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" fill="none" stroke="currentColor"/><rect x="2" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="20" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
    </span>
  </div>

  <!-- 导航栏 -->
  <div class="navbar">
    <div class="back" onclick="location.href='home.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff8a00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">危废管理</div>
  </div>

  <!-- 搜索 -->
  <div class="search-wrap">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="搜索品名、教研室" onkeydown="if(event.key==='Enter')doSearch()" />
    </div>
  </div>

  <!-- 统计 -->
  <div class="stat-row">
    <div class="stat blue"><div class="lbl">总记录数</div><div class="num" id="statTotal">5</div></div>
    <div class="stat green"><div class="lbl">液体</div><div class="num" id="statLiquid">3</div></div>
    <div class="stat purple"><div class="lbl">固体</div><div class="num" id="statSolid">2</div></div>
  </div>

  <!-- 列表 -->
  <div class="list" id="wasteList"></div>

  <!-- FAB -->
  <div class="fab" onclick="openForm()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    添加危废
  </div>

  <!-- 表单弹窗 -->
  <div class="mask" id="modalForm" onclick="if(event.target===this)closeForm()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-bar"></div>
      <h4 id="formTitle">添加危废</h4>
      <div class="form-item">
        <div class="lbl"><span class="req">*</span> 品名</div>
        <input class="ipt" id="fName" placeholder="请输入危废品名" />
      </div>
      <div class="form-item">
        <div class="lbl"><span class="req">*</span> 包装性质</div>
        <div class="switch-row">
          <div class="switch-opt active" id="optLiquid" onclick="pickPackageType('liquid')">液体</div>
          <div class="switch-opt" id="optSolid" onclick="pickPackageType('solid')">固体</div>
        </div>
      </div>
      <div class="form-item">
        <div class="lbl"><span class="req">*</span> 生产日期</div>
        <input class="ipt" id="fDate" type="date" />
      </div>
      <div class="form-item">
        <div class="lbl"><span class="req">*</span> 数量</div>
        <input class="ipt" id="fQty" type="number" step="0.1" placeholder="请输入数量" />
      </div>
      <div class="form-item">
        <div class="lbl"><span class="req">*</span> 单位</div>
        <input class="ipt" id="fUnit" placeholder="如：L、kg、个、桶" />
      </div>
      <div class="form-item">
        <div class="lbl">备注</div>
        <textarea class="ipt" id="fRemark" placeholder="请输入备注，如是否有剧毒、危险性等信息"></textarea>
      </div>
      <div class="form-item">
        <div class="lbl"><span class="req">*</span> 所属教研室</div>
        <div class="ipt-sel" id="fDept" onclick="openDeptSelect()">
          <span class="placeholder">请选择教研室</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aab0bb" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>
      <div class="modal-actions">
        <div class="btn cancel" onclick="closeForm()">取消</div>
        <div class="btn confirm" onclick="saveForm()">保存</div>
      </div>
    </div>
  </div>

  <!-- 教研室选择弹窗 -->
  <div class="mask" id="modalDept" onclick="if(event.target===this)closeDeptSelect()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-bar"></div>
      <h4>选择教研室</h4>
      <div class="dept-list" id="deptList"></div>
      <div class="modal-actions" style="margin-top:12px;">
        <div class="btn cancel" onclick="closeDeptSelect()">取消</div>
      </div>
    </div>
  </div>

  <!-- 删除确认 -->
  <div class="confirm-mask" id="confirmDel" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title" id="confirmTitle">确认删除</div>
      <div class="confirm-msg" id="confirmMsg">删除后不可恢复，是否继续？</div>
      <div class="confirm-btns">
        <div class="cb cancel" onclick="closeConfirm()">取消</div>
        <div class="cb ok" onclick="confirmDelete()">删除</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="home-indicator"></div>
</div>

<script>
  // 危废数据
  var wastes = [
    { id:1, name:'废弃丙酮溶液', packageType:'liquid', productionDate:'2025-06-15', quantity:2.5, unit:'L', remark:'含丙酮的实验室废液，具有易燃性和毒性', department:'有机化学教研室' },
    { id:2, name:'废活性炭', packageType:'solid', productionDate:'2025-05-20', quantity:5, unit:'kg', remark:'吸附有机溶剂后的废活性炭', department:'分析化学教研室' },
    { id:3, name:'废酸液', packageType:'liquid', productionDate:'2025-07-01', quantity:1.2, unit:'L', remark:'含硫酸、硝酸的混合废酸液，具强腐蚀性', department:'无机化学教研室' },
    { id:4, name:'废弃化学试剂瓶', packageType:'solid', productionDate:'2025-06-28', quantity:12, unit:'个', remark:'残留化学试剂的玻璃瓶和塑料瓶', department:'物理化学教研室' },
    { id:5, name:'含重金属废液', packageType:'liquid', productionDate:'2025-04-10', quantity:3.8, unit:'L', remark:'含铅、汞等重金属离子的实验废液，剧毒', department:'分析化学教研室' }
  ];

  var departments = ['有机化学教研室','无机化学教研室','分析化学教研室','物理化学教研室','高分子化学教研室','生物化学教研室','环境化学教研室','材料化学教研室'];

  var currentList = wastes.slice();
  var editingId = -1;
  var formPackageType = 'liquid';
  var formDepartment = '';
  var pendingDelId = -1;
  var nextId = 6;

  function genId(){ return nextId++; }

  // 渲染列表
  function render(list){
    var wrap = document.getElementById('wasteList');
    if(!list.length){
      wrap.innerHTML = '<div class="empty-state">暂无危废记录</div>';
    } else {
      wrap.innerHTML = list.map(function(w){
        var pkgLabel = w.packageType === 'liquid' ? '液体' : '固体';
        var pkgClass = w.packageType;
        return '<div class="card" onclick="goDetail('+w.id+')">'
          + '<div class="card-head">'
          +   '<div class="card-title"><span class="name">'+w.name+'</span><span class="status-tag '+pkgClass+'">'+pkgLabel+'</span></div>'
          +   '<div class="card-actions">'
          +     '<div class="icon-btn" onclick="event.stopPropagation();editWaste('+w.id+')" title="编辑"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/></svg></div>'
          +     '<div class="icon-btn" onclick="event.stopPropagation();delWaste('+w.id+')" title="删除"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg></div>'
          +   '</div>'
          + '</div>'
          + '<div class="info-row"><span class="lbl">生产日期：</span>'+(w.productionDate||'—')+'<span class="lbl2">数量：</span>'+w.quantity+' '+w.unit+'</div>'
          + '<div class="info-row"><span class="lbl">所属教研室：</span>'+(w.department||'—')+'</div>'
          + '<div class="card-foot">'
          +   '<div class="remark">'+(w.remark?('备注：'+w.remark):'—')+'</div>'
          +   '<div class="dept-pill">'+(w.department||'—')+'</div>'
          + '</div>'
          + '</div>';
      }).join('');
    }
    document.getElementById('statTotal').textContent = list.length;
    document.getElementById('statLiquid').textContent = list.filter(function(w){return w.packageType==='liquid';}).length;
    document.getElementById('statSolid').textContent = list.filter(function(w){return w.packageType==='solid';}).length;
  }

  // 搜索
  function doSearch(){
    var kw = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!kw){ currentList = wastes.slice(); render(currentList); return; }
    currentList = wastes.filter(function(w){
      return (w.name||'').toLowerCase().indexOf(kw)>-1
        || (w.department||'').toLowerCase().indexOf(kw)>-1;
    });
    render(currentList);
    toast(currentList.length ? '找到 '+currentList.length+' 条记录' : '未找到匹配记录');
  }

  // 包装性质切换
  function pickPackageType(type){
    formPackageType = type;
    document.getElementById('optLiquid').classList.toggle('active', type==='liquid');
    document.getElementById('optSolid').classList.toggle('active', type==='solid');
  }

  // 表单：新增
  function openForm(){
    editingId = -1;
    document.getElementById('formTitle').textContent = '添加危废';
    document.getElementById('fName').value = '';
    document.getElementById('fDate').value = '';
    document.getElementById('fQty').value = '';
    document.getElementById('fUnit').value = '';
    document.getElementById('fRemark').value = '';
    pickPackageType('liquid');
    formDepartment = '';
    document.getElementById('fDept').querySelector('span').textContent = '请选择教研室';
    document.getElementById('fDept').querySelector('span').classList.add('placeholder');
    document.getElementById('modalForm').classList.add('show');
  }

  // 表单：编辑
  function editWaste(id){
    var w = wastes.find(function(x){return x.id===id;});
    if(!w) return;
    editingId = id;
    document.getElementById('formTitle').textContent = '编辑危废';
    document.getElementById('fName').value = w.name;
    document.getElementById('fDate').value = w.productionDate;
    document.getElementById('fQty').value = w.quantity;
    document.getElementById('fUnit').value = w.unit;
    document.getElementById('fRemark').value = w.remark || '';
    pickPackageType(w.packageType);
    formDepartment = w.department || '';
    var span = document.getElementById('fDept').querySelector('span');
    span.textContent = formDepartment || '请选择教研室';
    if(formDepartment) span.classList.remove('placeholder');
    else span.classList.add('placeholder');
    document.getElementById('modalForm').classList.add('show');
  }

  function closeForm(){ document.getElementById('modalForm').classList.remove('show'); editingId = -1; }

  // 教研室选择
  function openDeptSelect(){
    var listEl = document.getElementById('deptList');
    listEl.innerHTML = departments.map(function(d){
      var cls = (d === formDepartment) ? 'dept-item selected' : 'dept-item';
      return '<div class="'+cls+'" onclick="pickDepartment(\''+d+'\')">'+d+'</div>';
    }).join('');
    document.getElementById('modalDept').classList.add('show');
  }
  function closeDeptSelect(){ document.getElementById('modalDept').classList.remove('show'); }
  function pickDepartment(dept){
    formDepartment = dept;
    var span = document.getElementById('fDept').querySelector('span');
    span.textContent = dept;
    span.classList.remove('placeholder');
    closeDeptSelect();
  }

  // 保存
  function saveForm(){
    var name = document.getElementById('fName').value.trim();
    var date = document.getElementById('fDate').value;
    var qtyStr = document.getElementById('fQty').value.trim();
    var unit = document.getElementById('fUnit').value.trim();
    var remark = document.getElementById('fRemark').value.trim();

    if(!name){ toast('请输入品名'); return; }
    if(!date){ toast('请选择生产日期'); return; }
    if(!qtyStr){ toast('请输入数量'); return; }
    var qty = parseFloat(qtyStr);
    if(isNaN(qty) || qty <= 0){ toast('请输入有效的数量'); return; }
    if(!unit){ toast('请输入单位'); return; }
    if(!formDepartment){ toast('请选择所属教研室'); return; }

    if(editingId >= 0){
      var w = wastes.find(function(x){return x.id===editingId;});
      if(w){
        w.name = name; w.packageType = formPackageType; w.productionDate = date;
        w.quantity = qty; w.unit = unit; w.remark = remark; w.department = formDepartment;
      }
      toast('已保存：'+name);
    } else {
      wastes.unshift({
        id: genId(), name: name, packageType: formPackageType,
        productionDate: date, quantity: qty, unit: unit, remark: remark, department: formDepartment
      });
      toast('已添加：'+name);
    }
    currentList = wastes.slice();
    render(currentList);
    sessionStorage.setItem('wasteData', JSON.stringify(wastes));
    closeForm();
  }

  // 删除
  function delWaste(id){
    var w = wastes.find(function(x){return x.id===id;});
    if(!w) return;
    pendingDelId = id;
    document.getElementById('confirmTitle').textContent = '确认删除';
    document.getElementById('confirmMsg').textContent = '删除「'+w.name+'」后不可恢复，是否继续？';
    document.getElementById('confirmDel').classList.add('show');
  }
  function closeConfirm(){
    document.getElementById('confirmDel').classList.remove('show');
    pendingDelId = -1;
  }
  function confirmDelete(){
    if(pendingDelId < 0) return;
    var w = wastes.find(function(x){return x.id===pendingDelId;});
    var idx = wastes.findIndex(function(x){return x.id===pendingDelId;});
    if(idx >= 0){
      wastes.splice(idx, 1);
      currentList = wastes.slice();
      render(currentList);
      sessionStorage.setItem('wasteData', JSON.stringify(wastes));
      toast('已删除：'+(w?w.name:''));
    }
    closeConfirm();
  }

  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 1600);
  }

  // 跳转详情
  function goDetail(id){
    location.href = 'waste-detail.html?id=' + id;
  }

  // 初始渲染
  render(currentList);
  // 同步数据到 sessionStorage 供详情页使用
  sessionStorage.setItem('wasteData', JSON.stringify(wastes));

  // 处理从详情页返回的编辑请求
  (function(){
    var params = new URLSearchParams(window.location.search);
    var editId = parseInt(params.get('edit')) || -1;
    if(editId >= 0){
      // 清除 URL 参数
      history.replaceState({}, '', 'waste-management.html');
      editWaste(editId);
    }
  })();
</script>
</body>
</html>
