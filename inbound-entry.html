<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>入库录入</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #e9eef5;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #1f2329;
    display: flex; justify-content: center; min-height: 100vh;
  }
  body { padding: 24px 0; }
  .phone {
    width: 390px; min-height: 844px;
    background: #f1f4fa;
    border-radius: 44px;
    box-shadow: 0 20px 50px rgba(20, 40, 80, 0.18);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }
  .statusbar { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #1f2329; }
  .status-right { display: flex; align-items: center; gap: 6px; }
  .status-right svg { display: block; }
  .nav { height: 44px; padding: 0 8px; display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; position: relative; }
  .nav .back { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #1f2329; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .nav .back:active { opacity: .5; }
  .nav .title { text-align: center; font-size: 17px; font-weight: 600; color: #1f2329; }
  .nav .filter-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; color: #1f2329; }
  .nav .filter-icon svg { stroke-dasharray: 2 2; }

  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 110px; }

  /* 扫码输入区 */
  .scan-wrap { padding: 8px 14px 10px; }
  .scan-box {
    display: flex; align-items: center; gap: 6px;
    height: 36px;
    background: #fff;
    border: 1.5px solid #2f7bff;
    border-radius: 10px;
    padding: 0 6px 0 12px;
  }
  .scan-box input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 13px; color: #1f2329; }
  .scan-box input::placeholder { color: #aab0bb; }
  .scan-btn {
    width: 30px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: #2f7bff;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
  }
  .scan-btn:active { background: #1f6ae8; }

  /* 表单卡片 */
  .form-card {
    background: #fff;
    border-radius: 12px;
    margin: 0 14px 12px;
    box-shadow: 0 2px 6px rgba(20,40,80,.04);
    overflow: hidden;
  }
  .form-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid #f0f2f5;
  }
  .form-head .title { font-size: 15px; font-weight: 600; color: #1f2329; }
  .form-head .del { color: #ff3b30; cursor: pointer; padding: 4px; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
  .form-row {
    display: flex; align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid #f0f2f5;
    min-height: 44px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .form-row:last-child { border-bottom: 0; }
  .form-row .k {
    width: 84px; flex-shrink: 0;
    font-size: 13px; color: #1f2329;
    display: flex; align-items: center; gap: 4px;
  }
  .form-row .k .req { color: #ff3b30; }
  .form-row .v { flex: 1; font-size: 13px; color: #1f2329; }
  .form-row .v.placeholder { color: #c8ccd4; }
  .form-row .v input {
    width: 100%; border: 0; outline: 0; background: transparent;
    font-size: 13px; color: #1f2329;
    text-align: right;
  }
  .form-row .v input::placeholder { color: #c8ccd4; }
  .form-row .arrow { color: #c8ccd4; margin-left: 6px; flex-shrink: 0; }

  /* 图片上传 */
  .img-row { padding: 12px 14px; }
  .img-row .k { font-size: 13px; color: #1f2329; margin-bottom: 8px; }
  .img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .img-add {
    aspect-ratio: 1/1;
    background: #f3f5f9;
    border-radius: 6px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #c8ccd4;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .img-add:active { background: #e9eef5; }
  .img-add svg { margin-bottom: 4px; }
  .img-add .count { font-size: 11px; }

  /* 备注卡 */
  .remark-card {
    background: #fff;
    border-radius: 12px;
    margin: 0 14px 12px;
    box-shadow: 0 2px 6px rgba(20,40,80,.04);
    overflow: hidden;
  }
  .remark-row {
    display: flex; align-items: center;
    padding: 12px 14px;
    min-height: 44px;
  }
  .remark-row .k { width: 60px; font-size: 13px; color: #1f2329; flex-shrink: 0; }
  .remark-row input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-size: 13px; color: #1f2329;
  }
  .remark-row input::placeholder { color: #c8ccd4; }

  /* 底部合计 */
  .bottom-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 70px;
    background: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px 16px;
    box-shadow: 0 -2px 10px rgba(20,40,80,.04);
    z-index: 20;
  }
  .total-info { font-size: 14px; color: #1f2329; }
  .total-info .v { color: #1f2329; font-weight: 700; margin-left: 4px; }
  .confirm-btn {
    height: 42px; padding: 0 28px;
    background: #2f7bff;
    color: #fff;
    border-radius: 21px;
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 12px rgba(47,123,255,.32);
  }
  .confirm-btn:active { background: #1f6ae8; }

  /* 弹窗/Toast */
  .mask { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
  .mask.show { display: flex; }
  .sheet { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 8px 0 20px; animation: slideUp .25s ease; max-height: 88%; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-bar { width: 36px; height: 4px; border-radius: 2px; background: #e1e5ec; margin: 6px auto 12px; }
  .sheet-title { text-align: center; font-size: 15px; font-weight: 600; color: #1f2329; margin-bottom: 8px; }
  .sheet-item { height: 48px; display: flex; align-items: center; gap: 10px; padding: 0 22px; font-size: 15px; color: #1f2329; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .sheet-item:active { background: #f3f5f9; }
  .sheet-cancel { margin-top: 6px; border-top: 8px solid #f1f4fa; height: 50px; display: flex; align-items: center; justify-content: center; color: #8a8f99; font-size: 15px; cursor: pointer; }
  .toast { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,.78); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 99; opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 260px; text-align: center; }
  .toast.show { opacity: 1; }
  .home-indicator { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #1f2329; z-index: 30; }

  /* 确认删除弹窗 */
  .confirm-mask {
    display: none; position: absolute; inset: 0; z-index: 70;
    background: rgba(0,0,0,.4);
    align-items: center; justify-content: center;
  }
  .confirm-mask.show { display: flex; }
  .confirm-card {
    width: 280px; background: #fff; border-radius: 14px; padding: 24px 20px 16px;
    text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,.15);
  }
  .confirm-card .msg { font-size: 15px; color: #1f2329; margin-bottom: 20px; line-height: 1.6; }
  .confirm-card .btns { display: flex; gap: 12px; }
  .confirm-card .btns .btn {
    flex: 1; height: 40px; border-radius: 20px; font-size: 15px; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: opacity .15s;
  }
  .confirm-card .btns .btn:active { opacity: .7; }
  .confirm-card .btns .btn-cancel { background: #f1f4fa; color: #1f2329; }
  .confirm-card .btns .btn-danger { background: #ff3b30; color: #fff; }


  /* 日期选择器 */
  .date-picker {
    display: none;
    position: absolute; inset: 0; z-index: 60;
    background: rgba(0,0,0,.4);
    align-items: flex-end; justify-content: center;
  }
  .date-picker.show { display: flex; }
  .date-pane { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 8px 0 20px; animation: slideUp .25s ease; }
  .date-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid #f0f2f5; }
  .date-head .btn { font-size: 14px; color: #2f7bff; cursor: pointer; padding: 4px 8px; }
  .date-head .btn.cancel { color: #8a8f99; }
  .date-head .title { font-size: 15px; font-weight: 600; }
  .date-input { padding: 12px 16px; }
  .date-input input { width: 100%; height: 40px; border: 1.5px solid #2f7bff; border-radius: 8px; padding: 0 12px; font-size: 14px; outline: 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>10:06</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0"  y="7" width="3" height="4" rx="0.5" fill="#1f2329"/><rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#1f2329"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#1f2329"/><rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#1f2329"/></svg>
      <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 10.5a1.2 1.2 0 100-2.4 1.2 1.2 0 000 2.4z" fill="#1f2329"/><path d="M3.5 6.2a6.4 6.4 0 019 0" stroke="#1f2329" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M1 3.5a9.5 9.5 0 0114 0" stroke="#1f2329" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="#1f2329" opacity=".4"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#1f2329"/><rect x="23.5" y="4" width="2" height="4" rx="1" fill="#1f2329" opacity=".4"/></svg>
    </div>
  </div>

  <div class="nav">
    <div class="back" onclick="goBack()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">入库录入</div>
    <div class="filter-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="14" cy="18" r="1" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="content">
    <!-- 扫码输入区 -->
    <div class="scan-wrap">
      <div class="scan-box">
        <input id="scanInput" type="text" placeholder="扫描（主）物料码自动查询物料" />
        <div class="scan-btn" onclick="doScan()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3z"/></svg>
        </div>
      </div>
    </div>

    <!-- 物料表单 -->
    <div class="form-card">
      <div class="form-head">
        <span class="title">物料</span>
        <span class="del" onclick="delMaterial()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </span>
      </div>
      <div class="form-row">
        <span class="k">选择物料<span class="req">*</span></span>
        <span class="v" id="vMaterial">试剂</span>
      </div>
      <div class="form-row">
        <span class="k">请选择批次<span class="req">*</span></span>
        <span class="v placeholder" id="vBatch">请选择批次</span>
        <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="form-row">
        <span class="k">单价<span class="req">*</span></span>
        <span class="v"><input id="iPrice" type="number" placeholder="请输入单价" oninput="updateTotal()" /></span>
      </div>
      <div class="form-row">
        <span class="k">数量</span>
        <span class="v"><input id="iQty" type="number" value="0" oninput="updateTotal()" /></span>
      </div>
      <div class="form-row" onclick="openDatePicker()">
        <span class="k">有效期至</span>
        <span class="v placeholder" id="vExpiry">请选择有效期</span>
        <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="form-row" onclick="pickWh()">
        <span class="k">存放仓库</span>
        <span class="v placeholder" id="vWh">请选择存放仓库</span>
        <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="form-row">
        <span class="k">接收人</span>
        <span class="v placeholder" id="vMember">选择团队成员</span>
        <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="img-row">
        <div class="k">图片</div>
        <div class="img-grid">
          <div class="img-add" onclick="addImg()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span class="count">(0/9)</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 备注 -->
    <div class="remark-card">
      <div class="remark-row">
        <span class="k">备注</span>
        <input id="iRemark" type="text" placeholder="请输入备注" />
      </div>
    </div>
  </div>

  <!-- 底部合计 -->
  <div class="bottom-bar">
    <div class="total-info">本次入库合计：<span class="v" id="vTotal">0.00 元</span></div>
    <div class="confirm-btn" onclick="confirmInbound()">确认入库</div>
  </div>

  <!-- 仓库选择弹窗 -->
  <div class="mask" id="sheetWh" onclick="if(event.target===this)closeSheet('sheetWh')">
    <div class="sheet">
      <div class="sheet-bar"></div>
      <div class="sheet-title">选择存放仓库（仅"启用"的仓库）</div>
      <div class="sheet-item" onclick="chooseWh('乃东路一号库')">乃东路一号库</div>
      <div class="sheet-item" onclick="chooseWh('泽当中心库')">泽当中心库</div>
      <div class="sheet-cancel" onclick="closeSheet('sheetWh')">取消</div>
    </div>
  </div>

  <!-- 右上筛选弹窗 -->
  <div class="mask" id="sheetFilter" onclick="if(event.target===this)closeSheet('sheetFilter')">
    <div class="sheet">
      <div class="sheet-bar"></div>
      <div class="sheet-title">高级筛选</div>
      <div class="sheet-item" onclick="toast('按物料类目筛选（待开发）')">按物料类目筛选</div>
      <div class="sheet-item" onclick="toast('按入库时间筛选（待开发）')">按入库时间筛选</div>
      <div class="sheet-cancel" onclick="closeSheet('sheetFilter')">取消</div>
    </div>
  </div>

  <!-- 日期选择器 -->
  <div class="date-picker" id="datePicker" onclick="if(event.target===this)closeDatePicker()">
    <div class="date-pane" onclick="event.stopPropagation()">
      <div class="date-head">
        <span class="btn cancel" onclick="closeDatePicker()">取消</span>
        <span class="title">选择有效期</span>
        <span class="btn" onclick="confirmDate()">确定</span>
      </div>
      <div class="date-input">
        <input id="dateVal" type="date" />
      </div>
    </div>
  </div>

  <!-- 确认删除弹窗 -->
  <div class="confirm-mask" id="confirmDel" onclick="if(event.target===this)closeConfirmDel()">
    <div class="confirm-card" onclick="event.stopPropagation()">
      <div class="msg">确定删除该物料行？</div>
      <div class="btns">
        <div class="btn btn-cancel" onclick="closeConfirmDel()">取消</div>
        <div class="btn btn-danger" onclick="doConfirmDel()">删除</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="home-indicator"></div>
</div>

<script>
  // 扫码
  function doScan(){
    var v = document.getElementById('scanInput').value;
    if(!v) { toast('请先扫码或输入物料码'); return; }
    toast('已查询到物料：试剂');
  }

  // 仓库
  function pickWh(){ openSheet('sheetWh'); }
  function chooseWh(w){
    closeSheet('sheetWh');
    var el = document.getElementById('vWh');
    el.textContent = w; el.classList.remove('placeholder');
    toast('已选择仓库：'+w);
  }

  // 删除物料
  function delMaterial(){
    document.getElementById('confirmDel').classList.add('show');
  }
  function closeConfirmDel(){
    document.getElementById('confirmDel').classList.remove('show');
  }
  function doConfirmDel(){
    closeConfirmDel();
    toast('已删除（演示用）');
  }

  // 图片
  function addImg(){
    toast('打开相机/相册（功能待开发）');
  }

  // 日期
  function openDatePicker(){
    document.getElementById('datePicker').classList.add('show');
  }
  function closeDatePicker(){
    document.getElementById('datePicker').classList.remove('show');
  }
  function confirmDate(){
    var v = document.getElementById('dateVal').value;
    if(!v){ toast('请选择日期'); return; }
    var el = document.getElementById('vExpiry');
    el.textContent = v; el.classList.remove('placeholder');
    closeDatePicker();
  }

  // 金额合计
  function updateTotal(){
    var p = parseFloat(document.getElementById('iPrice').value) || 0;
    var q = parseFloat(document.getElementById('iQty').value) || 0;
    document.getElementById('vTotal').textContent = (p * q).toFixed(2) + ' 元';
  }

  // 确认入库
  function confirmInbound(){
    var price = parseFloat(document.getElementById('iPrice').value) || 0;
    if(price <= 0){
      toast('请输入单价');
      return;
    }
    toast('入库成功');
  }

  function openSheet(id){ document.getElementById(id).classList.add('show'); }
  function closeSheet(id){ document.getElementById(id).classList.remove('show'); }

  function goBack(){
    if(history.length > 1) history.back();
    else location.href = 'inbound.html';
  }

  var toastTimer;
  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }
</script>
</body>
</html>
