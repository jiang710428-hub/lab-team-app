<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的 - 个人中心</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    background: #e9eef5;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
    color: #1f2329;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  body { padding: 24px 0; }

  /* 手机外框 */
  .phone {
    width: 390px;
    min-height: 844px;
    background: #f4f6fa;
    border-radius: 44px;
    box-shadow: 0 20px 50px rgba(20, 40, 80, 0.18);
    overflow: hidden;
    position: relative;
    padding-bottom: 30px;
  }

  /* 状态栏 */
  .status-bar {
    height: 44px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
    color: #1f2329;
  }
  .status-right { display: flex; align-items: center; gap: 6px; }
  .status-right svg { display: block; }

  /* 头部蓝渐变 */
  .header {
    background: linear-gradient(180deg, #cfe1ff 0%, #f4f6fa 100%);
    padding: 0 20px 22px;
    position: relative;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
  }
  .header-title {
    font-size: 17px;
    font-weight: 600;
    color: #1f2329;
  }

  /* 用户信息 */
  .user {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 6px 4px 6px;
  }
  .avatar {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    background: linear-gradient(135deg, #f3c89c 0%, #b78a5f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
  }
  .avatar svg { width: 100%; height: 100%; }
  .user .meta { display: flex; flex-direction: column; gap: 6px; }
  .user .name { font-size: 18px; font-weight: 600; color: #1f2329; }
  .user .team { font-size: 12px; color: #6b7280; }

  /* 主菜单白卡（圆角合并） */
  .menu {
    background: #fff;
    margin: 0 16px;
    border-radius: 14px;
    box-shadow: 0 2px 6px rgba(20, 40, 80, 0.04);
    overflow: hidden;
  }
  .menu .row {
    display: flex;
    align-items: center;
    padding: 16px 14px;
    border-bottom: 1px solid #f0f2f5;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: background .15s;
  }
  .menu .row:active { background: #f4f6fa; }
  .menu .row:last-child { border-bottom: none; }
  .menu .ico {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .menu .label { flex: 1; font-size: 15px; color: #1f2329; }
  .menu .right { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8a8f99; }
  .menu .right .num { color: #2f7bff; font-weight: 600; }
  .menu .arrow { color: #c5c8cf; }

  /* 区块分组 */
  .section {
    background: #fff;
    margin: 12px 16px 0;
    border-radius: 14px;
    box-shadow: 0 2px 6px rgba(20, 40, 80, 0.04);
    padding: 16px 14px 14px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #1f2329;
    margin-bottom: 14px;
  }
  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    row-gap: 14px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    row-gap: 14px;
  }
  .g-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: transform .15s;
  }
  .g-item:active { transform: scale(.92); }
  .g-item .ico {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .g-item .lbl { font-size: 12px; color: #1f2329; }

  /* TabBar */
  .tabbar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 70px;
    background: #fff;
    border-top: 1px solid #eef0f3;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    align-items: start;
    padding-top: 8px;
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 11px;
    color: #8a8f99;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: transform .15s;
  }
  .tab:active { transform: scale(.92); }
  .tab.active { color: #2f7bff; }
  .tab .ico { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; position: relative; }
  .tab .dot {
    position: absolute; top: -2px; right: -2px;
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff3b30; border: 1.5px solid #fff;
  }
  .home-indicator {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; background: #1f2329;
  }
</style>
</head>
<body>
<div class="phone">

  <!-- 状态栏 -->
  <div class="status-bar">
    <span>12:00</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0"  y="7" width="3" height="4" rx="0.5" fill="#1f2329"/><rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#1f2329"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#1f2329"/><rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#1f2329"/></svg>
      <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 10.5a1.2 1.2 0 100-2.4 1.2 1.2 0 000 2.4z" fill="#1f2329"/><path d="M3.5 6.2a6.4 6.4 0 019 0" stroke="#1f2329" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M1 3.5a9.5 9.5 0 0114 0" stroke="#1f2329" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="#1f2329" opacity=".4"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#1f2329"/><rect x="23.5" y="4" width="2" height="4" rx="1" fill="#1f2329" opacity=".4"/></svg>
    </div>
  </div>

  <!-- 头部 -->
  <div class="header">
    <div class="header-row">
      <div class="header-title">我的</div>
    </div>
    <div class="user">
      <div class="avatar">
        <!-- 简洁人像 SVG -->
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stop-color="#fbe3c0"/>
              <stop offset="1" stop-color="#c69b6b"/>
            </linearGradient>
          </defs>
          <rect width="60" height="60" fill="url(#bg)"/>
          <circle cx="30" cy="24" r="9" fill="#3a2a1c"/>
          <path d="M12 56c2-12 9-18 18-18s16 6 18 18z" fill="#3a2a1c"/>
        </svg>
      </div>
      <div class="meta">
        <div class="name">南山花开</div>
        <div class="team">前沿交叉学院团队</div>
      </div>
    </div>
  </div>

  <!-- 主菜单卡 -->
  <div class="menu">
    <div class="row" onclick="location.href='scan.html'">
      <div class="ico">
        <!-- 扫一扫：绿框+扫描线 -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3fc59f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 8V5a1 1 0 011-1h3M20 8V5a1 1 0 00-1-1h-3M4 16v3a1 1 0 001 1h3M20 16v3a1 1 0 01-1 1h-3"/>
          <path d="M4 12h16" stroke="#ff8a8a" stroke-width="1.4"/>
        </svg>
      </div>
      <span class="label">扫一扫</span>
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
    </div>
    <div class="row" onclick="location.href='my-appointment.html'">
      <div class="ico">
        <!-- 我的预约：绿日历 -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3fc59f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <path d="M3 9h18M8 3v4M16 3v4"/>
          <circle cx="8" cy="14" r="1" fill="#3fc59f"/>
          <circle cx="12" cy="14" r="1" fill="#3fc59f"/>
          <circle cx="16" cy="14" r="1" fill="#3fc59f"/>
        </svg>
      </div>
      <span class="label">我的预约</span>
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
    </div>
    <div class="row" onclick="toast('我的话题')">
      <div class="ico">
        <!-- 我的话题：绿对话气泡 -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3fc59f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h12a2 2 0 012 2v6a2 2 0 01-2 2h-3l-3 3v-3H4a2 2 0 01-2-2V8a2 2 0 012-2z" fill="#3fc59f" opacity=".15"/>
          <path d="M4 6h12a2 2 0 012 2v6a2 2 0 01-2 2h-3l-3 3v-3H4a2 2 0 01-2-2V8a2 2 0 012-2z"/>
          <path d="M10 11h2M8 14h6" stroke-width="1.4"/>
        </svg>
      </div>
      <span class="label">我的话题</span>
      <div class="right">你收到<span class="num">99+</span>条新回复</div>
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
    </div>
  </div>

  <!-- 帮助中心 -->
  <div class="section">
    <div class="section-title">帮助中心</div>
    <div class="grid-4">
      <div class="g-item" onclick="toast('版本介绍')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <path d="M4 10l12-5 12 5v6l-12 5-12-5z" fill="#7dd3a0"/>
            <path d="M4 18l12 5 12-5" stroke="#3fc59f" stroke-width="1.6" fill="none" opacity=".7"/>
          </svg>
        </div>
        <span class="lbl">版本介绍</span>
      </div>
      <div class="g-item" onclick="toast('近期更新')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="5" y="6" width="22" height="20" rx="3" fill="#7ec0ff"/>
            <rect x="5" y="6" width="22" height="6" rx="3" fill="#5aa8f5"/>
            <circle cx="11" cy="18" r="1.5" fill="#fff"/>
            <circle cx="16" cy="18" r="1.5" fill="#fff"/>
          </svg>
        </div>
        <span class="lbl">近期更新</span>
      </div>
      <div class="g-item" onclick="toast('功能说明')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="5" y="5" width="10" height="10" rx="2" fill="#3fc59f"/>
            <rect x="17" y="5" width="10" height="10" rx="2" fill="#3fc59f"/>
            <rect x="5" y="17" width="10" height="10" rx="2" fill="#3fc59f"/>
            <rect x="17" y="17" width="10" height="10" rx="2" fill="#7ec0ff"/>
            <circle cx="22" cy="22" r="2" fill="#fff"/>
          </svg>
        </div>
        <span class="lbl">功能说明</span>
      </div>
      <div class="g-item" onclick="toast('关于我们')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <path d="M16 4l11 6v8c0 6-5 10-11 10S5 24 5 18v-8z" fill="#3fc59f"/>
            <path d="M16 14v6M16 10v.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="lbl">关于我们</span>
      </div>
    </div>
  </div>

  <!-- 其他 -->
  <div class="section">
    <div class="section-title">其他</div>
    <div class="grid-3">
      <div class="g-item" onclick="toast('个人资料')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="4" y="6" width="24" height="22" rx="2" fill="#3fc59f"/>
            <circle cx="16" cy="14" r="3" fill="#fff"/>
            <path d="M10 23c1-3 3-4 6-4s5 1 6 4" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="lbl">个人资料</span>
      </div>
      <div class="g-item" onclick="toast('绑定邮箱')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="3" y="8" width="26" height="18" rx="3" fill="#7ec0ff"/>
            <path d="M3 10l13 9 13-9" stroke="#fff" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="lbl">绑定邮箱</span>
      </div>
      <div class="g-item" onclick="toast('修改密码')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <circle cx="11" cy="16" r="5" fill="#3fc59f"/>
            <rect x="15" y="14.5" width="13" height="3" rx="1.5" fill="#3fc59f"/>
            <path d="M9 14v-3a3 3 0 016 0v3" stroke="#3fc59f" stroke-width="1.8" fill="none"/>
            <circle cx="11" cy="16" r="1.6" fill="#fff"/>
          </svg>
        </div>
        <span class="lbl">修改密码</span>
      </div>
      <div class="g-item" onclick="toast('切换账号')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <path d="M5 16a8 8 0 0113-6l3-3v8h-8l3-3a5 5 0 00-8 4" stroke="#3fc59f" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M27 16a8 8 0 01-13 6l-3 3v-8h8l-3 3a5 5 0 008-4" stroke="#7ec0ff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="lbl">切换账号</span>
      </div>
      <div class="g-item" onclick="toast('使用协议')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="6" y="4" width="20" height="24" rx="2" fill="#3fc59f"/>
            <path d="M10 10h12M10 14h12M10 18h8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="lbl">使用协议</span>
      </div>
      <div class="g-item" onclick="toast('邀请链接')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="4" y="9" width="20" height="16" rx="2" fill="#7ec0ff"/>
            <path d="M4 11l10 7 10-7" stroke="#fff" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
            <circle cx="25" cy="9" r="4" fill="#3fc59f"/>
            <path d="M23 9h4M25 7v4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="lbl">邀请链接</span>
      </div>
      <div class="g-item" onclick="toast('审计日志')">
        <div class="ico">
          <svg viewBox="0 0 32 32" width="32" height="32">
            <rect x="8" y="4" width="16" height="24" rx="2" fill="#9b8cff"/>
            <path d="M8 4h16v5H8z" fill="#7a6cff"/>
            <path d="M12 12l2 2 4-4M12 18l2 2 4-4" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20" cy="14" r="1.6" fill="#fff"/>
            <circle cx="20" cy="20" r="1.6" fill="#fff"/>
          </svg>
        </div>
        <span class="lbl">审计日志</span>
      </div>
    </div>
  </div>

  <!-- TabBar -->
  <div class="tabbar">
    <div class="tab" onclick="location.href='home.html'">
      <div class="ico">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8a8f99" stroke-width="1.8" stroke-linejoin="round">
          <path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-9z"/>
        </svg>
      </div>
      <span>首页</span>
    </div>
    <div class="tab" onclick="toast('AI助手')">
      <div class="ico">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8a8f99" stroke-width="1.8" stroke-linejoin="round">
          <rect x="4" y="6" width="16" height="12" rx="2"/>
          <circle cx="9" cy="12" r="1.2" fill="#8a8f99"/>
          <circle cx="15" cy="12" r="1.2" fill="#8a8f99"/>
          <path d="M12 4v2M12 18v2" stroke-linecap="round"/>
        </svg>
      </div>
      <span>AI助手</span>
    </div>
    <div class="tab" onclick="toast('资料库')">
      <div class="ico">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8a8f99" stroke-width="1.8" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
          <path d="M8 8h8M8 12h8M8 16h5" stroke-linecap="round"/>
        </svg>
        <span class="dot"></span>
      </div>
      <span>资料库</span>
    </div>
    <div class="tab active">
      <div class="ico">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#2f7bff" stroke-width="1.8" stroke-linejoin="round">
          <circle cx="12" cy="9" r="3.5" fill="#cfe1ff"/>
          <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/>
        </svg>
      </div>
      <span>我的</span>
    </div>
    <div class="home-indicator"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:99;opacity:0;pointer-events:none;transition:opacity .2s;"></div>

<script>
  var toast = function(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.opacity = '1';
    clearTimeout(window._t);
    window._t = setTimeout(function(){ el.style.opacity = '0'; }, 1600);
  };
</script>
</body>
</html>
