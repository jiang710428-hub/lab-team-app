<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>入库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #e9eef5;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #1f2329;
    display: flex; justify-content: center; min-height: 100vh;
  }
  body { padding: 24px 0; }
  .phone {
    width: 390px; min-height: 844px;
    background: #f1f4fa;
    border-radius: 44px;
    box-shadow: 0 20px 50px rgba(20, 40, 80, 0.18);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }

  /* 状态栏 */
  .statusbar { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #1f2329; }
  .status-right { display: flex; align-items: center; gap: 6px; }
  .status-right svg { display: block; }

  /* 导航栏 */
  .nav { height: 44px; padding: 0 8px; display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; position: relative; }
  .nav .back { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #1f2329; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .nav .back:active { opacity: .5; }
  .nav .title { text-align: center; font-size: 17px; font-weight: 600; color: #1f2329; }
  .nav .more { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .nav .more svg { color: #1f2329; }

  /* Tab 栏 */
  .tabs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    align-items: center;
    padding: 4px 4px 8px;
    background: #f1f4fa;
  }
  .tab {
    text-align: center;
    font-size: 14px;
    color: #1f2329;
    padding: 8px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .tab.active { font-weight: 600; }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 3px;
    border-radius: 2px;
    background: #2f7bff;
  }

  /* 搜索区 */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px 10px;
  }
  .search-box {
    flex: 1;
    height: 36px;
    background: #fff;
    border: 1.5px solid #2f7bff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
  }
  .search-box svg { color: #2f7bff; flex-shrink: 0; }
  .search-box input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 13px; color: #1f2329; }
  .search-box input::placeholder { color: #aab0bb; }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: #1f2329;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    padding: 4px 4px;
  }
  .filter-btn svg { color: #1f2329; }
  .no-cursor { cursor: default; }

  /* 统计行 */
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 18px 8px;
    font-size: 13px;
    color: #4a4f57;
  }
  .stat-row .v { color: #1f2329; font-weight: 500; }

  /* 列表 */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 110px; }
  .list { padding: 0 14px; }
  .record-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(20,40,80,.04);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .record-card:active { opacity: .85; }
  .record-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .record-name { font-size: 15px; font-weight: 700; color: #1f2329; }
  .record-more {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    color: #8a8f99;
  }
  .record-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    font-size: 13px;
    color: #4a4f57;
  }
  .record-grid .k { color: #8a8f99; }
  .record-grid .v { color: #1f2329; font-weight: 500; }
  .record-remark {
    margin-top: 10px;
    padding: 8px 10px;
    background: #f1f4fa;
    border-radius: 6px;
    font-size: 12px;
    color: #8a8f99;
  }
  .empty {
    text-align: center;
    color: #c8ccd4;
    font-size: 13px;
    padding: 24px 0 8px;
  }

  /* 底部双按钮 */
  .bottom-bar {
    position: absolute;
    left: 0; right: 0; bottom: 22px;
    display: flex;
    gap: 12px;
    padding: 0 18px;
    z-index: 20;
  }
  .bottom-btn {
    flex: 1;
    height: 46px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 12px rgba(20,40,80,.12);
  }
  .bottom-btn.green { background: #2f9e44; }
  .bottom-btn.green:active { background: #258a39; }
  .bottom-btn.blue { background: #2f7bff; }
  .bottom-btn.blue:active { background: #1f6ae8; }

  /* 弹窗/Toast */
  .mask { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
  .mask.show { display: flex; }
  .sheet { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 8px 0 20px; animation: slideUp .25s ease; max-height: 88%; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-bar { width: 36px; height: 4px; border-radius: 2px; background: #e1e5ec; margin: 6px auto 12px; }
  .sheet-title { text-align: center; font-size: 15px; font-weight: 600; color: #1f2329; margin-bottom: 8px; }
  .sheet-item { height: 48px; display: flex; align-items: center; gap: 10px; padding: 0 22px; font-size: 15px; color: #1f2329; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .sheet-item:active { background: #f3f5f9; }
  .sheet-cancel { margin-top: 6px; border-top: 8px solid #f1f4fa; height: 50px; display: flex; align-items: center; justify-content: center; color: #8a8f99; font-size: 15px; cursor: pointer; }
  .toast { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,.78); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 99; opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 260px; text-align: center; }
  .toast.show { opacity: 1; }
  .modal-center { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 60; display: none; align-items: center; justify-content: center; padding: 0 24px; }
  .modal-center.show { display: flex; }
  .modal-box { width: 100%; background: #fff; border-radius: 14px; padding: 18px 16px 14px; animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-box h4 { font-size: 16px; margin-bottom: 4px; text-align: center; }
  .home-indicator { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #1f2329; z-index: 30; }
</style>
</head>
<body>
<div class="phone">
  <!-- 状态栏 -->
  <div class="statusbar">
    <span>09:53</span>
    <div class="status-right">
      <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0"  y="7" width="3" height="4" rx="0.5" fill="#1f2329"/><rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="#1f2329"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="#1f2329"/><rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="#1f2329"/></svg>
      <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 10.5a1.2 1.2 0 100-2.4 1.2 1.2 0 000 2.4z" fill="#1f2329"/><path d="M3.5 6.2a6.4 6.4 0 019 0" stroke="#1f2329" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M1 3.5a9.5 9.5 0 0114 0" stroke="#1f2329" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="#1f2329" opacity=".4"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#1f2329"/><rect x="23.5" y="4" width="2" height="4" rx="1" fill="#1f2329" opacity=".4"/></svg>
    </div>
  </div>

  <!-- 导航栏 -->
  <div class="nav">
    <div class="back" onclick="goBack()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">物料</div>
    <div class="more" onclick="toast('更多功能待开发')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab" onclick="switchTab('list', this)">物料列表</div>
    <div class="tab active" onclick="switchTab('in', this)">入库</div>
    <div class="tab" onclick="switchTab('out', this)">出库</div>
    <div class="tab" onclick="switchTab('cat', this)">类目</div>
    <div class="tab" onclick="switchTab('wh', this)">仓库</div>
  </div>

  <!-- 搜索 + 筛选 -->
  <div class="search-bar">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="请输入物料名称或编号" onkeydown="if(event.key==='Enter')doSearch()" />
    </div>
    <div class="filter-btn no-cursor">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
      <span>筛选</span>
    </div>
  </div>

  <!-- 统计行 -->
  <div class="stat-row">
    <span>入库总金额</span>
    <span class="v" id="statAmount">1000.00元</span>
  </div>

  <!-- 列表 -->
  <div class="content">
    <div class="list" id="recordList"></div>
    <div class="empty">没有更多入库记录了</div>
  </div>

  <!-- 底部双按钮 -->
  <div class="bottom-bar">
    <div class="bottom-btn green" onclick="location.href='inbound-entry.html'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM20 14v3M14 20h3M20 20h1"/></svg>
      扫码入库
    </div>
    <div class="bottom-btn blue" onclick="location.href='inbound-material.html'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      物料入库
    </div>
  </div>

  <!-- 记录操作弹窗 -->
  <div class="mask" id="sheetRec" onclick="if(event.target===this)closeSheet('sheetRec')">
    <div class="sheet">
      <div class="sheet-bar"></div>
      <div class="sheet-title" id="recOpTitle">入库记录操作</div>
      <div class="sheet-item" onclick="recOp('查看详情')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/></svg>
        查看详情
      </div>
      <div class="sheet-item" onclick="recOp('编辑')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        编辑
      </div>
      <div class="sheet-item" onclick="recOp('删除')" style="color:#ff3b30;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        删除
      </div>
      <div class="sheet-cancel" onclick="closeSheet('sheetRec')">取消</div>
    </div>
  </div>

  <!-- 筛选弹窗 -->
  <div class="mask" id="sheetFilter" onclick="if(event.target===this)closeSheet('sheetFilter')">
    <div class="sheet">
      <div class="sheet-bar"></div>
      <div class="sheet-title">筛选条件</div>
      <div class="sheet-item" onclick="applyFilter('全部')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
        全部
      </div>
      <div class="sheet-item" onclick="applyFilter('本周')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        本周
      </div>
      <div class="sheet-item" onclick="applyFilter('本月')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        本月
      </div>
      <div class="sheet-item" onclick="applyFilter('本季度')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
        本季度
      </div>
      <div class="sheet-cancel" onclick="closeSheet('sheetFilter')">取消</div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-center" id="modalDel" onclick="if(event.target===this)closeModal('modalDel')">
    <div class="modal-box">
      <h4>确定删除该入库记录？</h4>
      <p style="font-size:13px;color:#8a8f99;text-align:center;margin-bottom:14px;" id="delName"></p>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;height:40px;border-radius:8px;background:#f1f4fa;color:#4a4f57;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;" onclick="closeModal('modalDel')">取消</div>
        <div style="flex:1;height:40px;border-radius:8px;background:#ff3b30;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;" onclick="doDelete()">删除</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="home-indicator"></div>
</div>

<script>
  // 入库记录数据
  var records = [
    { name:'试剂', no:'a3321', batch:'pc0002', qty:10, time:'2026-07-07 08:39', remark:'暂无备注', amount:1000 },
    { name:'实验用手套', no:'c1025', batch:'pc0003', qty:20, time:'2026-07-06 14:22', remark:'加急入库', amount:600 },
    { name:'离心管', no:'c2078', batch:'pc0004', qty:50, time:'2026-07-05 10:15', remark:'暂无备注', amount:750 }
  ];

  // Tab 切换
  function switchTab(key, el){
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    if(key === 'list'){ location.href = 'material.html'; }
    else if(key === 'out'){ location.href = 'outbound.html'; }
    else if(key === 'cat'){ toast('类目页面待开发'); }
    else if(key === 'wh'){ location.href = 'warehouse.html'; }
  }

  function goBack(){
    if(history.length > 1) history.back();
    else location.href = 'home.html';
  }

  function renderRecords(){
    var list = document.getElementById('recordList');
    if(!records.length){
      list.innerHTML = '';
      return;
    }
    list.innerHTML = records.map(function(r, i){
      return '<div class="record-card" onclick="location.href=\'inbound-detail.html?idx='+i+'\'">'
        + '<div class="record-head">'
        +   '<span class="record-name">'+r.name+'</span>'
        +   '<span class="record-more" onclick="event.stopPropagation();openRecOp('+i+')">'
        +     '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>'
        +   '</span>'
        + '</div>'
        + '<div class="record-grid">'
        +   '<div><span class="k">物料编号</span> <span class="v">'+r.no+'</span></div>'
        +   '<div><span class="k">入库数量</span> <span class="v">'+r.qty+'</span></div>'
        +   '<div><span class="k">批次编号</span> <span class="v">'+r.batch+'</span></div>'
        +   '<div><span class="k">入库时间</span> <span class="v">'+r.time+'</span></div>'
        + '</div>'
        + (r.remark ? '<div class="record-remark">'+r.remark+'</div>' : '')
        + '</div>';
    }).join('');
  }

  // 记录操作
  function openRecOp(i){
    var r = records[i];
    document.getElementById('recOpTitle').textContent = r.name + ' 入库记录';
    window._curRec = i;
    openSheet('sheetRec');
  }
  function recOp(name){
    closeSheet('sheetRec');
    var r = records[window._curRec];
    if(name === '删除'){
      document.getElementById('delName').textContent = r.name + '（'+r.batch+'）';
      openModal('modalDel');
    } else {
      toast(name + '（功能待开发）');
    }
  }
  function doDelete(){
    closeModal('modalDel');
    records.splice(window._curRec, 1);
    renderRecords();
    updateAmount();
    toast('已删除');
  }
  function openModal(id){ document.getElementById(id).classList.add('show'); }
  function closeModal(id){ document.getElementById(id).classList.remove('show'); }

  // 搜索
  function doSearch(){
    var kw = document.getElementById('searchInput').value.trim();
    toast(kw ? ('搜索"'+kw+'" 共'+records.length+'条') : '请输入关键词');
  }

  // 筛选
  function openFilter(){ openSheet('sheetFilter'); }
  function applyFilter(type){
    closeSheet('sheetFilter');
    toast('筛选：'+type+'（功能待开发）');
  }

  // 统计金额
  function updateAmount(){
    var total = 0;
    records.forEach(function(r){ total += (r.amount || 0); });
    document.getElementById('statAmount').textContent = total.toFixed(2) + '元';
  }

  function openSheet(id){ document.getElementById(id).classList.add('show'); }
  function closeSheet(id){ document.getElementById(id).classList.remove('show'); }

  var toastTimer;
  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  // 初始化
  renderRecords();
  updateAmount();
</script>
</body>
</html>
