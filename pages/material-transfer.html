<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>物料调拨</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f1f4fa; color: #1f2329; }
  .phone { position: relative; width: 375px; height: 812px; margin: 20px auto; background: #f1f4fa; border-radius: 30px; box-shadow: 0 6px 24px rgba(0,0,0,.12); overflow: hidden; display: flex; flex-direction: column; }
  .statusbar { height: 44px; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #1f2329; background: #f1f4fa; flex-shrink: 0; }
  .statusbar .right { display: flex; align-items: center; gap: 6px; }
  .navbar { height: 44px; display: flex; align-items: center; justify-content: center; position: relative; background: #f1f4fa; flex-shrink: 0; }
  .navbar .back { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .navbar .title { font-size: 17px; font-weight: 600; color: #2f7bff; }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* 分组 */
  .group { background: #fff; border-radius: 12px; margin: 10px 14px; box-shadow: 0 2px 6px rgba(20,40,80,.04); overflow: hidden; }
  .group-title { background: #eef2f7; padding: 10px 14px; font-size: 13px; font-weight: 600; color: #1f2329; }

  /* 目标仓库选择器 */
  .wh-select { margin: 10px 14px; background: #fff; border-radius: 12px; box-shadow: 0 2px 6px rgba(20,40,80,.04); }
  .wh-select-label { padding: 10px 14px 0; font-size: 13px; font-weight: 600; color: #1f2329; }
  .wh-select-trigger { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .wh-select-trigger:active { background: #f7f9fc; border-radius: 12px; }
  .wh-select-trigger .ws-value { font-size: 14px; color: #1f2329; }
  .wh-select-trigger .ws-placeholder { font-size: 14px; color: #aab0bb; }
  .wh-select-trigger svg { color: #8a8f99; }

  /* 搜索 */
  .search-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; }
  .search-box { flex: 1; background: #f3f5f9; border-radius: 8px; height: 32px; display: flex; align-items: center; padding: 0 10px; gap: 6px; }
  .search-box svg { color: #8a8f99; flex-shrink: 0; }
  .search-box input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 12px; color: #1f2329; }
  .search-box input::placeholder { color: #aab0bb; }

  /* 表格 */
  .table-wrap { padding: 0 14px 10px; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #f0f2f5; border-radius: 8px; }
  .table-scroll::-webkit-scrollbar { height: 4px; }
  .table-scroll::-webkit-scrollbar-thumb { background: #d6dbe3; border-radius: 2px; }
  .table-scroll::-webkit-scrollbar-track { background: transparent; }
  table { border-collapse: collapse; width: max-content; min-width: 100%; }
  thead th { background: #f7f9fc; color: #8a8f99; font-size: 12px; font-weight: 500; padding: 10px 12px; text-align: left; white-space: nowrap; border-bottom: 1px solid #f0f2f5; position: sticky; top: 0; z-index: 1; }
  thead th:first-child { text-align: center; width: 40px; }
  tbody tr { border-bottom: 1px solid #f6f7f9; }
  tbody tr:last-child { border-bottom: 0; }
  tbody td { padding: 10px 12px; font-size: 12px; color: #1f2329; white-space: nowrap; }
  tbody td:first-child { text-align: center; }
  tbody tr:active { background: #f7f9fc; }
  .expiry-expired { color: #ff3b30; }
  .expiry-soon { color: #ff8a00; }

  /* 复选框 */
  .cb { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #d1d5db; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; background: #fff; transition: all .15s; }
  .cb.checked { background: #2f7bff; border-color: #2f7bff; }
  .cb.checked::after { content: ''; width: 9px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg); margin-top: -2px; }

  /* 底部按钮 */
  .footer { padding: 12px 14px 20px; flex-shrink: 0; background: #f1f4fa; }
  .btn-confirm { width: 100%; height: 44px; background: #2f7bff; color: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform .1s; }
  .btn-confirm:active { transform: scale(.97); }
  .btn-confirm:disabled { background: #b0c8f5; }
  .selected-count { text-align: center; font-size: 12px; color: #8a8f99; margin-bottom: 8px; }

  /* 二维码mini */
  .qr-mini { display: inline-block; vertical-align: middle; }

  .slide-hint { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 8px; font-size: 11px; color: #b8bcc4; background: #fafbfc; border-top: 1px solid #f0f2f5; }

  /* 底部弹窗 */
  .mask { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
  .mask.show { display: flex; }
  .sheet { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 8px 0 20px; animation: slideUp .25s ease; max-height: 70%; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-bar { width: 36px; height: 4px; border-radius: 2px; background: #e1e5ec; margin: 6px auto 12px; }
  .sheet-title { text-align: center; font-size: 15px; font-weight: 600; color: #1f2329; margin-bottom: 8px; }
  .sheet-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; cursor: pointer; -webkit-tap-highlight-color: transparent; border-bottom: 1px solid #f6f7f9; }
  .sheet-item:last-child { border-bottom: 0; }
  .sheet-item:active { background: #f7f9fc; }
  .sheet-item .si-info { display: flex; flex-direction: column; gap: 2px; }
  .sheet-item .si-name { font-size: 15px; color: #1f2329; }
  .sheet-item .si-no { font-size: 12px; color: #8a8f99; }
  .sheet-item .si-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sheet-item.selected .si-check { border-color: #2f7bff; background: #2f7bff; }
  .sheet-item.selected .si-check::after { content: ''; width: 8px; height: 4px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg); margin-top: -2px; }
  .sheet-cancel-out { background: #fff; text-align: center; padding: 14px; font-size: 16px; color: #1f2329; border-radius: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; margin: 8px 0 0; }
  .sheet-cancel-out:active { background: #f3f5f9; }

  .toast { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,.78); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 99; opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 260px; text-align: center; }
  .toast.show { opacity: 1; }
  .home-indicator { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #1f2329; }
</style>
</head>
<body>
<div class="phone">

  <!-- 状态栏 -->
  <div class="statusbar">
    <span>12:00</span>
    <span class="right">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 22l4-12 4 12H2zm10 0V8l8 14h-8z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7.5 3 3.7 5.7 2 9.5L12 22l10-12.5C20.3 5.7 16.5 3 12 3z"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" fill="none" stroke="currentColor"/><rect x="2" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="20" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
    </span>
  </div>

  <!-- 导航栏 -->
  <div class="navbar">
    <div class="back" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2f7bff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">物料调拨</div>
  </div>

  <div class="content">
    <!-- 目标仓库选择器 -->
    <div class="wh-select">
      <div class="wh-select-label">目标仓库</div>
      <div class="wh-select-trigger" onclick="openWhSheet()">
        <span class="ws-placeholder" id="wsValue">请选择目标仓库（仅"启用"的仓库）</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>

    <!-- 调拨范围 -->
    <div class="group">
      <div class="group-title">调拨范围</div>
      <div class="search-row">
        <div class="search-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
          <input id="searchInput" placeholder="搜索子编号、批次号" oninput="doSearch()" />
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th><div class="cb" id="cbAll" onclick="toggleAll()"></div></th>
                <th>序号</th>
                <th>子编号</th>
                <th>物料二维码</th>
                <th>有效期至</th>
                <th>批次号</th>
                <th>单价</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="slide-hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l-6-6 6-6"/><path d="M15 6l6 6-6 6"/></svg>
          左右滑动查看完整数据
        </div>
      </div>
    </div>
  </div>

  <!-- 底部确认 -->
  <div class="footer">
    <div class="selected-count" id="selCount">已选 0 项</div>
    <div class="btn-confirm" id="btnConfirm" onclick="confirmTransfer()">确认调拨</div>
  </div>

  <!-- 目标仓库选择弹窗 -->
  <div class="mask" id="whSheet" onclick="if(event.target===this)closeWhSheet()">
    <div style="width:100%;padding:0 0 18px;animation:slideUp .25s ease;" onclick="event.stopPropagation()">
      <div class="sheet">
        <div class="sheet-bar"></div>
        <div class="sheet-title">选择目标仓库</div>
        <div id="whSheetList"></div>
      </div>
      <div class="sheet-cancel-out" onclick="closeWhSheet()">取消</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="home-indicator"></div>
</div>

<script>
  // 仓库数据
  var warehouses = [
    { no:'WH-001', name:'乃东路一号库', manager:'扎西顿珠', addr:'山南市乃东路21号', status:'on', remark:'存放湿试剂与核心耗材', stock:159, related:2 },
    { no:'WH-002', name:'泽当中心库', manager:'次仁旺姆', addr:'山南市泽当大道108号', status:'on', remark:'大型物料主要取货仓', stock:74, related:3 },
    { no:'WH-003', name:'嘎嘎仓库', manager:'扎西顿珠', addr:'', status:'off', remark:'', stock:0, related:0 }
  ];

  // 解析URL参数
  var params = new URLSearchParams(location.search);
  var whIdx = parseInt(params.get('whIdx') || '0', 10);
  if(isNaN(whIdx) || whIdx < 0 || whIdx >= warehouses.length) whIdx = 0;
  var matIdx = parseInt(params.get('matIdx') || '0', 10);
  var wh = warehouses[whIdx];

  // 各仓库物料
  var whMaterials = {
    'WH-001': [
      { name:'试剂A', no:'a3321', cat:'试剂', spec:'500ml/瓶', stock:9, unit:'瓶', wh:'乃东路一号库' },
      { name:'实验用手套', no:'c1025', cat:'耗材', spec:'100副/盒', stock:50, unit:'盒', wh:'乃东路一号库' },
      { name:'离心管', no:'c2078', cat:'耗材', spec:'1.5ml/包', stock:100, unit:'包', wh:'乃东路一号库' }
    ],
    'WH-002': [
      { name:'试剂B', no:'a3322', cat:'试剂', spec:'250ml/瓶', stock:15, unit:'瓶', wh:'泽当中心库' },
      { name:'一次性使用无菌注射器', no:'m1102', cat:'耗材', spec:'5ml/支', stock:1200, unit:'支', wh:'泽当中心库' },
      { name:'培养皿', no:'c3010', cat:'耗材', spec:'90mm/个', stock:300, unit:'个', wh:'泽当中心库' }
    ],
    'WH-003': []
  };
  var matData = whMaterials[wh.no] || [];
  var mat = matData[matIdx] || matData[0] || { name:'—', no:'—', unit:'' };

  // 子物料数据（与物料详情页一致，参考日期 2026-07-08）
  var NOW = new Date('2026-07-08');
  var subItems = [
    { no:'A001', expiry:'2026-07-20', batch:'B20250101', price:2.50 },
    { no:'A002', expiry:'2026-07-15', batch:'B20250102', price:2.50 },
    { no:'A003', expiry:'2026-06-30', batch:'B20250103', price:2.80 },
    { no:'A004', expiry:'2025-12-31', batch:'B20240104', price:2.50 },
    { no:'A005', expiry:'2026-08-20', batch:'B20240105', price:2.60 },
    { no:'A006', expiry:'2026-07-22', batch:'B20250106', price:2.50 },
    { no:'A007', expiry:'2027-01-25', batch:'B20250107', price:2.70 }
  ];
  var currentSubs = subItems.slice();
  var selectedSet = {}; // 选中的子编号
  var selectedWh = -1;  // 选中的目标仓库index

  function expiryStatus(dateStr){
    var d = new Date(dateStr);
    var diff = (d - NOW) / (1000*60*60*24);
    if(diff < 0) return 'expired';
    if(diff <= 15) return 'soon';
    return 'normal';
  }

  function expiryClass(dateStr){
    var s = expiryStatus(dateStr);
    return s === 'expired' ? 'expiry-expired' : s === 'soon' ? 'expiry-soon' : '';
  }

  // mini二维码SVG
  function qrMiniSvg(){
    return '<svg class="qr-mini" width="28" height="28" viewBox="0 0 100 100">'
      + '<rect width="100" height="100" fill="#fff" stroke="#e5e7eb"/>'
      + '<rect x="8" y="8" width="22" height="22" fill="#1f2329"/><rect x="12" y="12" width="14" height="14" fill="#fff"/><rect x="15" y="15" width="8" height="8" fill="#1f2329"/>'
      + '<rect x="70" y="8" width="22" height="22" fill="#1f2329"/><rect x="74" y="12" width="14" height="14" fill="#fff"/><rect x="77" y="15" width="8" height="8" fill="#1f2329"/>'
      + '<rect x="8" y="70" width="22" height="22" fill="#1f2329"/><rect x="12" y="74" width="14" height="14" fill="#fff"/><rect x="15" y="77" width="8" height="8" fill="#1f2329"/>'
      + '<g fill="#1f2329"><rect x="36" y="8" width="4" height="4"/><rect x="44" y="8" width="4" height="4"/><rect x="52" y="8" width="4" height="4"/><rect x="60" y="8" width="4" height="4"/>'
      + '<rect x="40" y="20" width="4" height="4"/><rect x="48" y="20" width="4" height="4"/><rect x="56" y="20" width="4" height="4"/>'
      + '<rect x="36" y="36" width="4" height="4"/><rect x="48" y="36" width="4" height="4"/><rect x="60" y="36" width="4" height="4"/><rect x="72" y="36" width="4" height="4"/><rect x="84" y="36" width="4" height="4"/>'
      + '<rect x="40" y="44" width="4" height="4"/><rect x="52" y="44" width="4" height="4"/><rect x="64" y="44" width="4" height="4"/><rect x="76" y="44" width="4" height="4"/>'
      + '<rect x="36" y="52" width="4" height="4"/><rect x="44" y="52" width="4" height="4"/><rect x="56" y="52" width="4" height="4"/><rect x="68" y="52" width="4" height="4"/><rect x="80" y="52" width="4" height="4"/>'
      + '<rect x="40" y="60" width="4" height="4"/><rect x="52" y="60" width="4" height="4"/><rect x="64" y="60" width="4" height="4"/><rect x="76" y="60" width="4" height="4"/>'
      + '<rect x="40" y="72" width="4" height="4"/><rect x="52" y="72" width="4" height="4"/><rect x="60" y="72" width="4" height="4"/><rect x="72" y="72" width="4" height="4"/><rect x="84" y="72" width="4" height="4"/>'
      + '<rect x="44" y="80" width="4" height="4"/><rect x="56" y="80" width="4" height="4"/><rect x="64" y="80" width="4" height="4"/><rect x="80" y="80" width="4" height="4"/>'
      + '<rect x="40" y="88" width="4" height="4"/><rect x="52" y="88" width="4" height="4"/><rect x="68" y="88" width="4" height="4"/><rect x="80" y="88" width="4" height="4"/>'
      + '</g></svg>';
  }

  // 渲染表格
  function renderTable(){
    var tb = document.getElementById('tbody');
    if(!currentSubs.length){
      tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8a8f99;padding:24px 0;">暂无匹配的子物料</td></tr>';
      updateAllCheckbox();
      updateSelCount();
      return;
    }
    tb.innerHTML = currentSubs.map(function(s, i){
      var checked = selectedSet[s.no] ? ' checked' : '';
      return '<tr>'
        + '<td><div class="cb'+checked+'" onclick="toggleRow(\''+s.no+'\')"></div></td>'
        + '<td>'+(i+1)+'</td>'
        + '<td>'+s.no+'</td>'
        + '<td>'+qrMiniSvg()+'</td>'
        + '<td class="'+expiryClass(s.expiry)+'">'+s.expiry+'</td>'
        + '<td>'+s.batch+'</td>'
        + '<td>&yen;'+s.price.toFixed(2)+'</td>'
        + '</tr>';
    }).join('');
    updateAllCheckbox();
    updateSelCount();
  }

  // 搜索
  function doSearch(){
    var kw = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!kw){ currentSubs = subItems.slice(); }
    else {
      currentSubs = subItems.filter(function(s){
        return (s.no||'').toLowerCase().indexOf(kw) > -1 || (s.batch||'').toLowerCase().indexOf(kw) > -1;
      });
    }
    renderTable();
  }

  // 勾选/取消单行
  function toggleRow(no){
    if(selectedSet[no]) delete selectedSet[no];
    else selectedSet[no] = true;
    renderTable();
  }

  // 全选/取消全选
  function toggleAll(){
    var allChecked = currentSubs.every(function(s){ return selectedSet[s.no]; });
    if(allChecked){
      currentSubs.forEach(function(s){ delete selectedSet[s.no]; });
    } else {
      currentSubs.forEach(function(s){ selectedSet[s.no] = true; });
    }
    renderTable();
  }

  function updateAllCheckbox(){
    var cbAll = document.getElementById('cbAll');
    if(!currentSubs.length){ cbAll.classList.remove('checked'); return; }
    var allChecked = currentSubs.every(function(s){ return selectedSet[s.no]; });
    cbAll.classList.toggle('checked', allChecked);
  }

  function updateSelCount(){
    var count = Object.keys(selectedSet).length;
    document.getElementById('selCount').textContent = '已选 ' + count + ' 项';
    document.getElementById('btnConfirm').disabled = (count === 0 || selectedWh < 0);
  }

  // 目标仓库底部弹窗
  function openWhSheet(){
    renderWhSheetList();
    document.getElementById('whSheet').classList.add('show');
  }
  function closeWhSheet(){
    document.getElementById('whSheet').classList.remove('show');
  }

  function renderWhSheetList(){
    var list = document.getElementById('whSheetList');
    var opts = warehouses.filter(function(w){ return w.status === 'on' && w.no !== wh.no; });
    if(!opts.length){
      list.innerHTML = '<div style="padding:14px 22px;text-align:center;font-size:13px;color:#8a8f99;">暂无可选仓库</div>';
      return;
    }
    list.innerHTML = opts.map(function(w){
      var realIdx = warehouses.indexOf(w);
      return '<div class="sheet-item'+(realIdx === selectedWh ? ' selected' : '')+'" onclick="pickWh('+realIdx+')">'
        + '<div class="si-info"><span class="si-name">'+w.name+'</span><span class="si-no">'+w.no+' · '+(w.manager||'—')+'</span></div>'
        + '<div class="si-check"></div>'
        + '</div>';
    }).join('');
  }

  function pickWh(idx){
    selectedWh = idx;
    var w = warehouses[idx];
    var dt = document.getElementById('wsValue');
    dt.textContent = w.name + '（'+w.no+'）';
    dt.className = 'ws-value';
    closeWhSheet();
    updateSelCount();
  }

  // 确认调拨
  function confirmTransfer(){
    var count = Object.keys(selectedSet).length;
    if(count === 0){ toast('请选择要调拨的物料'); return; }
    if(selectedWh < 0){ toast('请选择目标仓库'); return; }
    var target = warehouses[selectedWh];
    var selectedNos = Object.keys(selectedSet).join('、');
    toast('已将 '+count+' 项物料（'+selectedNos+'）调拨至「'+target.name+'」');
    setTimeout(function(){ history.back(); }, 1200);
  }

  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  // 初始化
  renderTable();
  updateSelCount();
</script>
</body>
</html>
