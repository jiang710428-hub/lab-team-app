<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队成员 - 首页</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    background: #e9eef5;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
    color: #1f2329;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  body { padding: 24px 0; }

  /* 手机外框 */
  .phone {
    width: 390px;
    min-height: 844px;
    background: #f4f6fa;
    border-radius: 44px;
    box-shadow: 0 20px 50px rgba(20, 40, 80, 0.18);
    overflow: hidden;
    position: relative;
    padding-bottom: 30px;
  }

  /* 状态栏 */
  .status-bar {
    height: 44px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
    color: #1f2329;
  }
  .status-right { display: flex; align-items: center; gap: 6px; }
  .status-right svg { display: block; }

  /* 顶部蓝渐变头部 */
  .header {
    background: linear-gradient(180deg, #cfe1ff 0%, #f4f6fa 100%);
    padding: 4px 20px 24px;
    position: relative;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 44px;
  }
  .bell {
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
  }
  .bell .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    min-width: 18px;
    height: 18px;
    padding: 0 4px;
    border-radius: 9px;
    background: #ff3b30;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #fff;
  }
  .header-title {
    font-size: 17px;
    font-weight: 600;
    color: #1f2329;
  }

  /* 8宫格 */
  .grid-wrap {
    background: #fff;
    border-radius: 14px;
    margin: 12px 16px 0;
    padding: 18px 8px 14px;
    box-shadow: 0 2px 6px rgba(20, 40, 80, 0.04);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    row-gap: 18px;
  }
  .grid-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .15s ease;
  }
  .grid-item:active { transform: scale(.92); }
  .grid-item .icon {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid-item .label {
    font-size: 13px;
    color: #1f2329;
  }

  /* 双卡片 */
  .dual-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px 0;
  }
  .mini-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px 12px 10px;
    box-shadow: 0 2px 6px rgba(20, 40, 80, 0.04);
  }
  .mini-card .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .mini-card .title {
    font-size: 14px;
    font-weight: 600;
    color: #1f2329;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .mini-card .title .red-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff3b30;
    display: inline-block;
  }
  .mini-card .desc {
    font-size: 11px;
    color: #8a8f99;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mini-card svg.icon-right { opacity: .85; }

  /* 待办事项 */
  .todo {
    background: #fff;
    border-radius: 14px;
    margin: 14px 16px 0;
    padding: 14px 16px 4px;
    box-shadow: 0 2px 6px rgba(20, 40, 80, 0.04);
  }
  .todo h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .todo-item {
    padding: 10px 0;
    border-bottom: 1px solid #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item .l { display: flex; flex-direction: column; gap: 4px; }
  .todo-item .name { font-size: 15px; font-weight: 500; }
  .todo-item .desc { font-size: 12px; color: #8a8f99; }
  .todo-item .desc .num { font-weight: 700; }
  .todo-item .arrow { color: #c5c8cf; }
  .num-orange { color: #ff8a00; }
  .num-green  { color: #2cc275; }
  .num-blue   { color: #2f7bff; }

  /* 科研笔记日志 */
  .log {
    background: #fff;
    border-radius: 14px;
    margin: 14px 16px 0;
    padding: 14px 16px 16px;
    box-shadow: 0 2px 6px rgba(20, 40, 80, 0.04);
  }
  .log-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .log-head h3 { font-size: 16px; font-weight: 600; }
  .log-head .date {
    font-size: 13px;
    color: #1f2329;
    display: flex; align-items: center; gap: 4px;
  }
  .log-head .date .arrow-d {
    width: 16px; height: 16px; border-radius: 50%;
    background: #d6dde6; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .week-row, .day-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
  }
  .week-row span { font-size: 13px; color: #8a8f99; padding: 6px 0 8px; }
  .day-row span { font-size: 14px; color: #1f2329; padding: 6px 0; position: relative; }
  .day-row span.muted { color: #b8bcc4; }
  .day-row span.today { color: #2f7bff; font-weight: 600; }

  /* TabBar */
  .tabbar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 70px;
    background: #fff;
    border-top: 1px solid #eef0f3;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    align-items: start;
    padding-top: 8px;
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 11px;
    color: #8a8f99;
    position: relative;
  }
  .tab.active { color: #2f7bff; }
  .tab .ico { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; position: relative; }
  .tab .dot {
    position: absolute; top: -2px; right: -2px;
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff3b30; border: 1.5px solid #fff;
  }
  .home-indicator {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; background: #1f2329;
  }

  /* Toast */
  .toast {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,.78); color: #fff; padding: 10px 18px;
    border-radius: 8px; font-size: 13px; z-index: 99;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .toast.show { opacity: 1; }

  /* TabBar tab 可点击 */
  .tab[onclick] { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tab[onclick]:active { opacity: .7; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<script>
  var _t;
  function toast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(_t);
    _t = setTimeout(function(){ el.classList.remove('show'); }, 1800);
  }
</script>
</body>
</html>
