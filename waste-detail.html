<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>危废详情</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f1f4fa; color: #1f2329; }
  .phone { position: relative; width: 375px; height: 812px; margin: 20px auto; background: #f1f4fa; border-radius: 30px; box-shadow: 0 6px 24px rgba(0,0,0,.12); overflow: hidden; }
  .statusbar { height: 44px; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #1f2329; background: #f1f4fa; }
  .statusbar .right { display: flex; align-items: center; gap: 6px; }
  .navbar { height: 44px; display: flex; align-items: center; position: relative; background: #f1f4fa; padding: 0 12px; }
  .navbar .back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .navbar .title { flex: 1; font-size: 17px; font-weight: 600; color: #ff8a00; text-align: center; margin-right: 32px; }
  .content { padding: 0 14px; overflow-y: auto; height: calc(100% - 44px - 44px - 100px); }

  /* 头部概览卡片 */
  .header-card { background: linear-gradient(135deg, #fff8f0, #fff3e0); border-radius: 14px; padding: 18px 16px; margin-bottom: 10px; }
  .header-card .name { font-size: 20px; font-weight: 700; color: #1f2329; margin-bottom: 8px; }
  .header-card .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pkg-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; padding: 4px 10px; border-radius: 6px; font-weight: 600; }
  .pkg-badge.liquid { background: #e8f0ff; color: #2f7bff; }
  .pkg-badge.solid { background: #fff3e0; color: #ff8a00; }
  .header-card .dept { font-size: 13px; color: #8a8f99; }

  /* 信息区块 */
  .section { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .section-title { font-size: 13px; color: #8a8f99; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-title::before { content: ''; width: 3px; height: 14px; background: #ff8a00; border-radius: 2px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 10px; }
  .info-item { }
  .info-item .lbl { font-size: 12px; color: #8a8f99; margin-bottom: 3px; }
  .info-item .val { font-size: 15px; font-weight: 600; color: #1f2329; word-break: break-all; }
  .info-full { margin-top: 12px; }
  .info-full .lbl { font-size: 12px; color: #8a8f99; margin-bottom: 3px; }
  .info-full .val { font-size: 14px; color: #1f2329; line-height: 1.6; word-break: break-all; }

  /* 警告标签 */
  .warn-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 8px; border-radius: 4px; margin-top: 6px; }
  .warn-tag.danger { background: #ffeaea; color: #e53935; }
  .warn-tag.warn { background: #fff8e1; color: #f9a825; }

  /* 底部操作栏 */
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 14px 28px; display: flex; gap: 10px; background: linear-gradient(180deg, transparent 0%, #f1f4fa 20%, #f1f4fa 100%); }
  .btn { flex: 1; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn:active { transform: scale(.97); }
  .btn.back { background: #f3f4f6; color: #4a4f57; }
  .btn.edit { background: #ff8a00; color: #fff; }
  .btn.danger { background: #fff; color: #e53935; border: 1px solid #e53935; }

  .home-indicator { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: #1f2329; }
  .toast { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,.78); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 99; opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 260px; text-align: center; }
  .toast.show { opacity: 1; }

  /* 删除确认弹窗 */
  .confirm-mask { position: absolute; inset: 0; background: rgba(0,0,0,.4); z-index: 60; display: none; align-items: center; justify-content: center; padding: 0 40px; }
  .confirm-mask.show { display: flex; }
  .confirm-box { width: 100%; max-width: 280px; background: #fff; border-radius: 14px; overflow: hidden; animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .confirm-title { font-size: 16px; font-weight: 600; text-align: center; padding: 22px 20px 8px; color: #1f2329; }
  .confirm-msg { font-size: 14px; text-align: center; padding: 0 20px 20px; color: #8a8f99; line-height: 1.5; }
  .confirm-btns { display: flex; border-top: 1px solid #eef0f4; }
  .confirm-btns .cb { flex: 1; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .confirm-btns .cb.cancel { color: #4a4f57; border-right: 1px solid #eef0f4; }
  .confirm-btns .cb.ok { color: #e53935; }
  .confirm-btns .cb:active { background: #f3f5f9; }
</style>
</head>
<body>
<div class="phone">

  <!-- 状态栏 -->
  <div class="statusbar">
    <span>12:00</span>
    <span class="right">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 22l4-12 4 12H2zm10 0V8l8 14h-8z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7.5 3 3.7 5.7 2 9.5L12 22l10-12.5C20.3 5.7 16.5 3 12 3z"/></svg>
      <svg width="22" height="12" viewBox="0 0 22 12"><rect x="0" y="1" width="18" height="10" rx="2" fill="none" stroke="currentColor"/><rect x="2" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="20" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
    </span>
  </div>

  <!-- 导航栏 -->
  <div class="navbar">
    <div class="back" onclick="goBack()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff8a00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">危废详情</div>
  </div>

  <!-- 内容区 -->
  <div class="content" id="detailContent"></div>

  <!-- 底部操作 -->
  <div class="bottom-bar">
    <div class="btn back" onclick="goBack()">返回列表</div>
    <div class="btn edit" onclick="goEdit()">编辑</div>
  </div>

  <!-- 删除确认 -->
  <div class="confirm-mask" id="confirmDel" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="confirm-title">确认删除</div>
      <div class="confirm-msg" id="confirmMsg">删除后不可恢复，是否继续？</div>
      <div class="confirm-btns">
        <div class="cb cancel" onclick="closeConfirm()">取消</div>
        <div class="cb ok" onclick="confirmDelete()">删除</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="home-indicator"></div>
</div>

<script>
  // 从 waste-management.html 共享的数据（通过 sessionStorage 传递）
  var wasteData = null;
  var wasteId = -1;

  // 危废示例数据（与列表页同步，确保数据一致）
  var defaultWastes = [
    { id:1, name:'废弃丙酮溶液', packageType:'liquid', productionDate:'2025-06-15', quantity:2.5, unit:'L', remark:'含丙酮的实验室废液，具有易燃性和毒性', department:'有机化学教研室' },
    { id:2, name:'废活性炭', packageType:'solid', productionDate:'2025-05-20', quantity:5, unit:'kg', remark:'吸附有机溶剂后的废活性炭', department:'分析化学教研室' },
    { id:3, name:'废酸液', packageType:'liquid', productionDate:'2025-07-01', quantity:1.2, unit:'L', remark:'含硫酸、硝酸的混合废酸液，具强腐蚀性', department:'无机化学教研室' },
    { id:4, name:'废弃化学试剂瓶', packageType:'solid', productionDate:'2025-06-28', quantity:12, unit:'个', remark:'残留化学试剂的玻璃瓶和塑料瓶', department:'物理化学教研室' },
    { id:5, name:'含重金属废液', packageType:'liquid', productionDate:'2025-04-10', quantity:3.8, unit:'L', remark:'含铅、汞等重金属离子的实验废液，剧毒', department:'分析化学教研室' }
  ];

  function init(){
    var params = new URLSearchParams(window.location.search);
    wasteId = parseInt(params.get('id')) || -1;
    if(wasteId < 0){ toast('参数错误'); return; }

    // 优先从 sessionStorage 获取（编辑后保存的数据）
    var stored = sessionStorage.getItem('wasteData');
    if(stored){
      try { wasteData = JSON.parse(stored); } catch(e){}
    }
    // 如果没找到，用默认数据
    if(!wasteData) wasteData = defaultWastes;

    var w = wasteData.find(function(x){ return x.id === wasteId; });
    if(!w){ toast('未找到该危废记录'); return; }

    renderDetail(w);
  }

  function renderDetail(w){
    var pkgLabel = w.packageType === 'liquid' ? '液体' : '固体';
    var pkgClass = w.packageType;
    var pkgIcon = w.packageType === 'liquid'
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M12 2c-4 4-4 12 0 16m0-16c4 4 4 12 0 16"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>';

    // 检测危险关键词
    var dangerKeywords = ['剧毒','毒性','腐蚀','易燃','爆炸','致癌','放射性'];
    var warnKeywords = ['刺激','有害','氧化'];
    var hasDanger = dangerKeywords.some(function(k){ return (w.remark||'').indexOf(k) > -1; });
    var hasWarn = warnKeywords.some(function(k){ return (w.remark||'').indexOf(k) > -1; });

    var warnHtml = '';
    if(hasDanger) warnHtml += '<span class="warn-tag danger"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 4l7.5 14h-15L12 6zm-1 5h2v5h-2v-5zm0 7h2v2h-2v-2z"/></svg>危险品</span>';
    if(hasWarn) warnHtml += '<span class="warn-tag warn"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 4l7.5 14h-15L12 6zm-1 5h2v5h-2v-5zm0 7h2v2h-2v-2z"/></svg>需注意</span>';

    var html = ''
      + '<div class="header-card">'
      +   '<div class="name">' + w.name + '</div>'
      +   '<div class="meta-row">'
      +     '<span class="pkg-badge ' + pkgClass + '">' + pkgIcon + ' ' + pkgLabel + '</span>'
      +     '<span class="dept">' + (w.department || '—') + '</span>'
      +   '</div>'
      +   (warnHtml ? '<div style="margin-top:6px;">' + warnHtml + '</div>' : '')
      + '</div>'

      + '<div class="section">'
      +   '<div class="section-title">基本信息</div>'
      +   '<div class="info-grid">'
      +     '<div class="info-item"><div class="lbl">生产日期</div><div class="val">' + (w.productionDate || '—') + '</div></div>'
      +     '<div class="info-item"><div class="lbl">数量</div><div class="val">' + w.quantity + ' ' + w.unit + '</div></div>'
      +     '<div class="info-item"><div class="lbl">包装性质</div><div class="val">' + pkgLabel + '</div></div>'
      +     '<div class="info-item"><div class="lbl">单位</div><div class="val">' + w.unit + '</div></div>'
      +   '</div>'
      + '</div>'

      + '<div class="section">'
      +   '<div class="section-title">所属信息</div>'
      +   '<div class="info-item"><div class="lbl">所属教研室</div><div class="val">' + (w.department || '—') + '</div></div>'
      + '</div>'

      + '<div class="section">'
      +   '<div class="section-title">备注信息</div>'
      +   '<div class="info-full"><div class="val">' + (w.remark || '暂无备注') + '</div></div>'
      + '</div>';

    document.getElementById('detailContent').innerHTML = html;
  }

  function goBack(){
    location.href = 'waste-management.html';
  }

  function goEdit(){
    location.href = 'waste-management.html?edit=' + wasteId;
  }

  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 1600);
  }

  init();
</script>
</body>
</html>
